status = error
name = PropertiesConfig

filters = threshold

filter.threshold.type = ThresholdFilter
filter.threshold.level = debug

appenders = console

appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} - [%X{logContext}] %p [%c{1}] [%t] %m%n

rootLogger.level = info
rootLogger.appenderRefs = stdout
rootLogger.appenderRef.stdout.ref = STDOUT

# The following loggers produce excessive logs when set to INFO. Set them to ERROR to reduce log volume.
logger.zk.name = org.apache.zookeeper
logger.zk.level = error
logger.helix.name = org.apache.helix
logger.helix.level = error
logger.kafka.name = kafka
logger.kafka.level = error
logger.aKafka.name = org.apache.kafka
logger.aKafka.level = error
logger.e.name = org.eclipse
logger.e.level = off
logger.d2.name = com.linkedin.d2
logger.d2.level = error

# Phase 4 lean-aa-harness debugging
logger.aatask.name = com.linkedin.davinci.kafka.consumer.ActiveActiveStoreIngestionTask
logger.aatask.level = info
logger.lftask.name = com.linkedin.davinci.kafka.consumer.LeaderFollowerStoreIngestionTask
logger.lftask.level = info
logger.sittask.name = com.linkedin.davinci.kafka.consumer.StoreIngestionTask
logger.sittask.level = info
logger.aggkafka.name = com.linkedin.davinci.kafka.consumer.AggKafkaConsumerService
logger.aggkafka.level = info
logger.kafkacons.name = com.linkedin.davinci.kafka.consumer.KafkaConsumerService
logger.kafkacons.level = info
logger.pcs.name = com.linkedin.davinci.kafka.consumer.PartitionConsumptionState
logger.pcs.level = info
logger.harness.name = com.linkedin.venice.benchmark.lean
logger.harness.level = info